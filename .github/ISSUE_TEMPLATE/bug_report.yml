name: Bug report
description: Report something that is broken or behaving unexpectedly.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please do not include any sensitive or
        off-the-record session content in this report.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. See error
    validations:
      required: true

  - type: dropdown
    id: surface
    attributes:
      label: Which surface?
      options:
        - participant
        - projector
        - host
        - admin
        - builder
        - other / not sure
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Browser & device
      placeholder: e.g. Chrome 126 on macOS, Safari on iPhone 15
    validations:
      required: true

  - type: input
    id: context
    attributes:
      label: Room or module (if relevant)
      placeholder: e.g. room code, or module name like "friction-map"
    validations:
      required: false
