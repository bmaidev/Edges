name: Feature request
description: Suggest a new feature or improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: The use case or pain point motivating the request.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What you would like to happen.
    validations:
      required: true

  - type: dropdown
    id: surface
    attributes:
      label: Which surface does this relate to?
      options:
        - participant
        - projector
        - host
        - admin
        - builder
        - other / not sure
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
