name: CI

on:
  push:
  pull_request:

env:
  CI: true

jobs:
  build:
    name: typecheck · lint · test · build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      # No secrets needed: with no KV env the app falls back to an in-memory
      # store, and AI features are gated on a missing ANTHROPIC_API_KEY.
      - name: Build
        run: npm run build
